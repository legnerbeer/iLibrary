name: website

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pdoc -r requirements.txt

      - name: Build documentation
        run: |
          # 1. Erstelle den Ordner explizit, falls pdoc ihn nicht anlegt
          mkdir -p docs
          # 2. Generiere die Doku
          python -m pdoc -o docs app.iLibrary.src
          # 3. Das "Lösch-Signal" für Jekyll: Eine leere Datei namens .nojekyll
          touch docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4