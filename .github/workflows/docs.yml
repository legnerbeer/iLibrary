name: website

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Using 3.11 for stability; update as needed

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdoc
          pip install . 

      - name: Build documentation
        # Replace 'your_package_name' with the actual name of your folder/module
        run: pdoc --html -o docs/ . --force

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # pdoc usually creates a subfolder, so we point to the docs directory
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4