name: website

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pdoc

      - name: Build documentation with pdoc
        run: |
          # 1. Dokumentation generieren
          # Wir nutzen --no-include-undocumented falls nötig, 
          # aber wichtig ist der Output in 'docs'
          python -m pdoc -o docs app.iLibrary.src
          
          # 2. DER FIX: Erstellt die .nojekyll Datei im Output-Ordner
          # Dies verhindert, dass GitHub den fehlerhaften Jekyll-Prozess startet
          touch docs/.nojekyll 

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Lädt den Inhalt von docs/ hoch (inklusive der .nojekyll Datei)
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4